{% extends "!layout.html" %}

{% block document %}
<div class="zt-page-actions" role="navigation" aria-label="Page actions">
  <a class="zt-action-link" href="https://github.com/{{ github_user }}/{{ github_repo }}/edit/{{ github_version }}{{ pagename }}{{ suffix }}">Edit on GitHub</a>
  <a class="zt-action-link zt-action-link-primary" href="{{ pathto(pdf_download_path, 1) }}" download>Export PDF</a>
</div>
{{ super() }}
{% endblock %}
